<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michels Plumbing, Inc. | Aurora, IL</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-dark: #0a2540;
    --blue-mid: #1a4a7a;
    --blue-bright: #1e6fbb;
    --blue-light: #3a9fd8;
    --accent: #e8a020;
    --accent-light: #f5b942;
    --white: #ffffff;
    --off-white: #f4f7fb;
    --gray-light: #e8edf4;
    --gray-mid: #8a9bb0;
    --gray-dark: #3a4a5c;
    --text: #1a2a3a;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    color: var(--text);
    background: var(--white);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: rgba(10, 37, 64, 0.97);
    backdrop-filter: blur(10px);
    padding: 0 5%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.25);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .nav-logo-icon {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--blue-bright), var(--blue-light));
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .nav-logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }

  .nav-logo-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.3px;
  }

  .nav-logo-tag {
    font-size: 10px;
    color: var(--blue-light);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 6px;
    list-style: none;
  }

  .nav-links a {
    color: rgba(255,255,255,0.82);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 6px;
    transition: all 0.2s;
  }

  .nav-links a:hover {
    color: var(--white);
    background: rgba(255,255,255,0.1);
  }

  .nav-cta {
    background: linear-gradient(135deg, var(--accent), var(--accent-light)) !important;
    color: var(--blue-dark) !important;
    font-weight: 700 !important;
    padding: 8px 18px !important;
    border-radius: 8px !important;
    transition: all 0.2s !important;
    box-shadow: 0 2px 10px rgba(232,160,32,0.35);
  }

  .nav-cta:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 18px rgba(232,160,32,0.5) !important;
    background: rgba(0,0,0,0) !important;
  }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
    background: none;
    border: none;
  }

  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--white);
    border-radius: 2px;
    transition: all 0.3s;
  }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-mid) 50%, #0d3460 100%);
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
    padding: 100px 5% 60px;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -30%;
    right: -10%;
    width: 70vw;
    height: 70vw;
    background: radial-gradient(circle, rgba(30,111,187,0.3) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: -20%;
    left: -10%;
    width: 50vw;
    height: 50vw;
    background: radial-gradient(circle, rgba(58,159,216,0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-grid {
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
    position: relative;
    z-index: 2;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(232,160,32,0.15);
    border: 1px solid rgba(232,160,32,0.4);
    color: var(--accent-light);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 22px;
  }

  .hero h1 {
    font-size: clamp(36px, 5vw, 58px);
    font-weight: 800;
    color: var(--white);
    line-height: 1.12;
    margin-bottom: 22px;
    letter-spacing: -0.5px;
  }

  .hero h1 span {
    background: linear-gradient(90deg, var(--blue-light), var(--accent-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-desc {
    font-size: 17px;
    color: rgba(255,255,255,0.72);
    margin-bottom: 36px;
    max-width: 480px;
    line-height: 1.7;
  }

  .hero-actions {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    color: var(--blue-dark);
    font-size: 16px;
    font-weight: 700;
    padding: 14px 28px;
    border-radius: 10px;
    text-decoration: none;
    box-shadow: 0 4px 20px rgba(232,160,32,0.4);
    transition: all 0.25s;
    white-space: nowrap;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(232,160,32,0.55);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.25);
    color: var(--white);
    font-size: 16px;
    font-weight: 600;
    padding: 14px 28px;
    border-radius: 10px;
    text-decoration: none;
    transition: all 0.25s;
    white-space: nowrap;
  }

  .btn-secondary:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.4);
    transform: translateY(-2px);
  }

  .hero-trust {
    display: flex;
    gap: 24px;
    margin-top: 40px;
    flex-wrap: wrap;
  }

  .trust-item {
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.65);
    font-size: 13px;
    font-weight: 500;
  }

  .trust-item .check {
    width: 20px;
    height: 20px;
    background: rgba(30,111,187,0.4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--blue-light);
    flex-shrink: 0;
  }

  /* Hero Visual */
  .hero-visual {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .hero-card-stack {
    position: relative;
    width: 340px;
    height: 400px;
  }

  .hero-main-card {
    position: absolute;
    top: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 20px;
    padding: 32px;
    backdrop-filter: blur(10px);
  }

  .hmc-icon-row {
    display: flex;
    gap: 14px;
    margin-bottom: 24px;
  }

  .hmc-icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
  }

  .hmc-icon-1 { background: linear-gradient(135deg, #1a6fbb, #3a9fd8); }
  .hmc-icon-2 { background: linear-gradient(135deg, #0d8a6e, #14b890); }
  .hmc-icon-3 { background: linear-gradient(135deg, #8a3bbf, #b15fe0); }

  .hmc-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 6px;
  }

  .hmc-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    margin-bottom: 22px;
  }

  .hmc-stat-row {
    display: flex;
    gap: 16px;
  }

  .hmc-stat {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 14px 12px;
    text-align: center;
  }

  .hmc-stat-num {
    font-size: 22px;
    font-weight: 800;
    color: var(--white);
    line-height: 1;
    margin-bottom: 4px;
  }

  .hmc-stat-label {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .hero-float-card {
    position: absolute;
    background: var(--white);
    border-radius: 14px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    animation: float 3s ease-in-out infinite;
  }

  .hero-float-card.card-a {
    bottom: 60px;
    right: -20px;
    animation-delay: 0s;
  }

  .hero-float-card.card-b {
    bottom: -20px;
    left: 20px;
    animation-delay: 1.5s;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .fc-dot {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .fc-dot-green { background: #e6f9f4; }
  .fc-dot-blue { background: #e8f2fb; }

  .fc-text strong {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  .fc-text span {
    font-size: 11px;
    color: var(--gray-mid);
  }

  /* ── STATS BAR ── */
  .stats-bar {
    background: var(--blue-dark);
    padding: 32px 5%;
  }

  .stats-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }

  .stat-block {
    text-align: center;
    padding: 20px;
    border-right: 1px solid rgba(255,255,255,0.08);
  }

  .stat-block:last-child { border-right: none; }

  .stat-num {
    font-size: 36px;
    font-weight: 800;

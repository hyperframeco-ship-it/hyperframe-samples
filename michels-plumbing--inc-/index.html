<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michels Plumbing, Inc. | Aurora, IL</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-dark: #0a2540;
    --blue-mid: #1a4a7a;
    --blue-bright: #1e6fbf;
    --blue-light: #3a9bd5;
    --accent: #e8a020;
    --accent-light: #f5c04a;
    --white: #ffffff;
    --off-white: #f4f7fb;
    --gray-light: #e8edf4;
    --gray-mid: #8a9bb0;
    --gray-dark: #3a4a5c;
    --text: #1a2637;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    color: var(--text);
    background: var(--white);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: rgba(10, 37, 64, 0.97);
    backdrop-filter: blur(8px);
    border-bottom: 2px solid var(--accent);
    padding: 0 5%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
    transition: box-shadow 0.3s;
  }

  nav.scrolled { box-shadow: 0 4px 24px rgba(0,0,0,0.35); }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }

  .nav-logo-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--blue-light), var(--accent));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }

  .nav-logo-text { color: var(--white); }
  .nav-logo-text strong { display: block; font-size: 1.05rem; letter-spacing: 0.02em; }
  .nav-logo-text span { font-size: 0.72rem; color: var(--gray-mid); text-transform: uppercase; letter-spacing: 0.08em; }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 32px;
    list-style: none;
  }

  .nav-links a {
    color: rgba(255,255,255,0.82);
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--accent-light); }

  .nav-cta {
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    color: var(--blue-dark) !important;
    padding: 9px 20px;
    border-radius: 25px;
    font-weight: 700 !important;
    transition: transform 0.2s, box-shadow 0.2s !important;
  }

  .nav-cta:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(232,160,32,0.45);
  }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
  }

  .hamburger span {
    display: block;
    width: 26px; height: 2px;
    background: var(--white);
    border-radius: 2px;
    transition: all 0.3s;
  }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 70% 60%, rgba(58,155,213,0.18) 0%, transparent 60%),
      linear-gradient(160deg, #0a2540 0%, #0f3460 45%, #1a4a7a 100%);
    display: flex;
    align-items: center;
    padding: 100px 5% 60px;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -80px; right: -120px;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(30,111,191,0.25) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -80px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,160,32,0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  /* pipe decoration */
  .pipe-deco {
    position: absolute;
    right: 8%;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    opacity: 0.12;
    pointer-events: none;
  }

  .pipe-v {
    width: 48px;
    height: 280px;
    background: linear-gradient(90deg, rgba(255,255,255,0.2), rgba(255,255,255,0.6), rgba(255,255,255,0.2));
    border-radius: 4px;
  }

  .pipe-elbow {
    width: 80px; height: 80px;
    border: 48px solid rgba(255,255,255,0.5);
    border-radius: 0 0 0 80px;
    border-top: none;
    border-right: none;
    align-self: flex-end;
    margin-right: 16px;
  }

  .pipe-h {
    width: 200px; height: 48px;
    background: linear-gradient(180deg, rgba(255,255,255,0.2), rgba(255,255,255,0.6), rgba(255,255,255,0.2));
    border-radius: 4px;
    align-self: flex-end;
  }

  .hero-content { max-width: 640px; position: relative; z-index: 2; }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(232,160,32,0.15);
    border: 1px solid rgba(232,160,32,0.4);
    color: var(--accent-light);
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 6px 14px;
    border-radius: 20px;
    margin-bottom: 24px;
  }

  .hero h1 {
    font-size: clamp(2.2rem, 5vw, 3.6rem);
    font-weight: 800;
    color: var(--white);
    line-height: 1.15;
    margin-bottom: 20px;
  }

  .hero h1 span { color: var(--accent-light); }

  .hero-sub {
    font-size: clamp(1rem, 2vw, 1.18rem);
    color: rgba(255,255,255,0.72);
    max-width: 520px;
    margin-bottom: 36px;
    line-height: 1.7;
  }

  .hero-actions { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    color: var(--blue-dark);
    font-weight: 800;
    font-size: 1.02rem;
    padding: 15px 30px;
    border-radius: 50px;
    text-decoration: none;
    box-shadow: 0 6px 24px rgba(232,160,32,0.4);
    transition: transform 0.22s, box-shadow 0.22s;
    letter-spacing: 0.01em;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 32px rgba(232,160,32,0.55);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,255,255,0.35);
    color: var(--white);
    font-weight: 600;
    font-size: 1rem;
    padding: 14px 28px;
    border-radius: 50px;
    text-decoration: none;
    transition: background 0.22s, border-color 0.22s;
    backdrop-filter: blur(4px);
  }

  .btn-secondary:hover {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.6);
  }

  .hero-stats {
    display: flex;
    gap: 36px;
    margin-top: 52px;
    flex-wrap: wrap;
  }

  .stat { }
  .stat-num {
    display: block;
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent-light);
    line-height: 1;
  }
  .stat-label {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 4px;
    display: block;
  }

  .stat-divider {
    width: 1px;
    background: rgba(255,255,255,0.15);
    align-self: stretch;
  }

  /* ── TRUST BAR ── */
  .trust-bar {
    background: var(--off-white);
    border-top: 3px solid var(--accent);
    padding: 22px 5%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 32px 48px;
  }

  .trust-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.87rem;
    font-weight: 600;
    color: var(--blue-mid);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .trust-item span:first-child { font-size: 1.3rem; }

  /* ── SECTIONS ── */
  section { padding: 90px 5%; }

  .section-label {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--blue-bright);
    background: rgba(30,111,191,0.1);
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 14px;
  }

  .section-title {
    font-size: clamp(1.75rem, 3.5vw, 2.5rem);
    font-weight: 800;
    color: var(--blue-dark);
    line-height: 1.2;
    margin-bottom: 16px;
  }

  .section-sub {
    font-size: 1.05rem;
    color: var(--gray-dark);
    max-width: 560px;
    line-height: 1.75;
  }

  /* ── ABOUT ── */
  #about { background: var(--white); }

  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 64px;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
  }

  .about-visual {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
  }

  .about-graphic {
    width: 100%;
    aspect-ratio: 4/3;
    background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-mid) 50%, var(--blue-bright) 100%);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(10,37,64,0.3);
  }

  .about-graphic::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 30% 40%, rgba(58,155,213,0.3) 0%, transparent 50%),
      radial-gradient(circle at 75% 70%, rgba(232,160,32,0.15) 0%, transparent 45%);
  }

  .about-icon-wrap {
    position: relative;
    z-index: 2;
    text-align: center;
  }

  .about-main-icon {
    font-size: 5rem;
    display: block;
    margin-bottom: 12px;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.3));
  }

  .about-tagline {
    color: rgba(255,255,255,0.85);
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.04em;
  }

  .about-badge {
    position: absolute;
    bottom: -16px; right: -16px;
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    color: var(--blue-dark);
    padding: 18px 22px;
    border-radius: 16px;
    text-align: center;

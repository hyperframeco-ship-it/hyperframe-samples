<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michels Plumbing, Inc. | Aurora, IL</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0a1628;
    --blue: #1a3a6b;
    --accent: #2a7dd4;
    --light-blue: #4fa8e8;
    --gold: #e8a020;
    --white: #ffffff;
    --light-gray: #f4f7fb;
    --mid-gray: #e0e8f0;
    --text: #1a2535;
    --text-light: #556070;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    color: var(--text);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: rgba(10, 22, 40, 0.96);
    backdrop-filter: blur(10px);
    padding: 0 5%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
    border-bottom: 1px solid rgba(74, 168, 232, 0.15);
    transition: all 0.3s ease;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }

  .nav-logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--light-blue));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .nav-logo-text {
    color: var(--white);
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.3px;
    line-height: 1.2;
  }

  .nav-logo-text span {
    display: block;
    font-size: 0.65rem;
    font-weight: 400;
    color: var(--light-blue);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 32px;
    list-style: none;
  }

  .nav-links a {
    color: rgba(255,255,255,0.82);
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 500;
    letter-spacing: 0.3px;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--light-blue); }

  .nav-cta {
    background: linear-gradient(135deg, var(--accent), var(--light-blue));
    color: var(--white) !important;
    padding: 9px 20px !important;
    border-radius: 8px;
    font-weight: 600 !important;
    transition: opacity 0.2s, transform 0.2s !important;
  }

  .nav-cta:hover { opacity: 0.9; transform: translateY(-1px); }

  .hamburger {
    display: none;
    flex-direction: column;
    cursor: pointer;
    gap: 5px;
    background: none;
    border: none;
    padding: 4px;
  }

  .hamburger span {
    display: block;
    width: 24px; height: 2px;
    background: var(--white);
    border-radius: 2px;
    transition: all 0.3s;
  }

  .mobile-menu {
    display: none;
    position: fixed;
    top: 68px; left: 0; right: 0;
    background: rgba(10, 22, 40, 0.98);
    padding: 20px 5% 28px;
    z-index: 999;
    border-bottom: 1px solid rgba(74,168,232,0.15);
  }

  .mobile-menu.open { display: block; }

  .mobile-menu a {
    display: block;
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    font-size: 1rem;
    font-weight: 500;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    transition: color 0.2s;
  }

  .mobile-menu a:last-child { border-bottom: none; }
  .mobile-menu a:hover { color: var(--light-blue); }

  /* HERO */
  .hero {
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 70% 40%, rgba(42, 125, 212, 0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 20% 80%, rgba(26, 58, 107, 0.3) 0%, transparent 50%),
      linear-gradient(160deg, #040d1a 0%, #0a1628 35%, #0d2040 65%, #091520 100%);
    display: flex;
    align-items: center;
    padding: 120px 5% 80px;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -50%; right: -20%;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(42,125,212,0.08) 0%, transparent 70%);
    animation: pulse 8s ease-in-out infinite;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: -10%; left: -10%;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(79,168,232,0.06) 0%, transparent 70%);
    animation: pulse 10s ease-in-out infinite reverse;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.7; }
  }

  .hero-content {
    max-width: 680px;
    position: relative;
    z-index: 2;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(42, 125, 212, 0.15);
    border: 1px solid rgba(42, 125, 212, 0.3);
    color: var(--light-blue);
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 7px 16px;
    border-radius: 100px;
    margin-bottom: 28px;
  }

  .hero h1 {
    font-size: clamp(2.4rem, 5.5vw, 3.8rem);
    font-weight: 800;
    color: var(--white);
    line-height: 1.12;
    margin-bottom: 22px;
    letter-spacing: -0.5px;
  }

  .hero h1 em {
    font-style: normal;
    background: linear-gradient(135deg, var(--accent), var(--light-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p {
    font-size: 1.12rem;
    color: rgba(255,255,255,0.65);
    margin-bottom: 40px;
    max-width: 540px;
    line-height: 1.7;
  }

  .hero-buttons {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--light-blue) 100%);
    color: var(--white);
    text-decoration: none;
    padding: 16px 32px;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.2px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 30px rgba(42, 125, 212, 0.4);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(42, 125, 212, 0.55);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.18);
    color: var(--white);
    text-decoration: none;
    padding: 15px 28px;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    transition: background 0.2s, border-color 0.2s;
  }

  .btn-secondary:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.3);
  }

  .hero-stats {
    display: flex;
    gap: 40px;
    margin-top: 60px;
    padding-top: 48px;
    border-top: 1px solid rgba(255,255,255,0.08);
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
  }

  .stat-number {
    font-size: 2rem;
    font-weight: 800;
    color: var(--white);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-number span {
    color: var(--light-blue);
  }

  .stat-label {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 500;
  }

  .hero-visual {
    position: absolute;
    right: 5%;
    top: 50%;
    transform: translateY(-50%);
    width: 360px;
    height: 360px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }

  .pipe-graphic {
    width: 280px;
    height: 280px;
    position: relative;
  }

  .pipe-ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(42, 125, 212, 0.2);
    animation: rotate 20s linear infinite;
  }

  .pipe-ring:nth-child(1) { inset: 0; animation-duration: 20s; }
  .pipe-ring:nth-child(2) { inset: 30px; border-color: rgba(79,168,232,0.15); animation-duration: 15s; animation-direction: reverse; }
  .pipe-ring:nth-child(3) { inset: 60px; border-color: rgba(42,125,212,0.25); animation-duration: 25s; }

  .pipe-ring::before {
    content: '';
    position: absolute;
    top: -4px; left: 50%;
    transform: translateX(-50%);
    width: 8px; height: 8px;
    background: var(--light-blue);
    border-radius: 50%;
  }

  .pipe-center {
    position: absolute;
    inset: 90px;
    background: linear-gradient(135deg, rgba(26,58,107,0.8), rgba(42,125,212,0.3));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
    border: 2px solid rgba(42,125,212,0.3);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(42,125,212,0.2);
  }

  @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* TRUST BAR */
  .trust-bar {
    background: var(--white);
    padding: 24px 5%;
    border-bottom: 1px solid var(--mid-gray);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(20px, 4vw, 60px);
    flex-wrap: wrap;
  }

  .trust-item {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-light);
    font-size: 0.88rem;
    font-weight: 600;
    letter-spacing: 0.2px;
  }

  .trust-item .icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #e8f3fd, #c8e4f8);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  /* SECTION COMMON */
  section { padding: 90px 5%; }

  .section-tag {
    display: inline-block;
    background: linear-gradient(135deg, rgba(42,125,212,0.1), rgba(79,168,232,0.1));
    color: var(--accent);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 100px;
    border: 1px solid rgba(42,125,212,0.2);
    margin-bottom: 16px;
  }

  .section-title {
    font-size: clamp(1.9rem, 3.5vw, 2.8rem);
    font-weight: 800;
    color: var(
